backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

locale: 'fr'

collections:
  - name: "contenu"
    label: "Contenu du site"
    files:
      - name: "site"
        label: "Chez Cocotte — Tout le site"
        file: "content.json"
        fields:

          - label: "Accueil (Hero)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Petite ligne au-dessus du titre", name: "eyebrow", widget: "string" }
              - { label: "Titre — ligne 1", name: "titre_ligne1", widget: "string" }
              - { label: "Titre — ligne 2", name: "titre_ligne2", widget: "string" }
              - { label: "Titre — mot en italique", name: "titre_italique", widget: "string" }
              - { label: "Titre — fin de phrase", name: "titre_fin", widget: "string" }
              - { label: "Texte d'introduction", name: "texte", widget: "text" }

          - label: "Notre histoire"
            name: "histoire"
            widget: "object"
            fields:
              - { label: "Petite ligne au-dessus du titre", name: "eyebrow", widget: "string" }
              - { label: "Titre de la section", name: "titre", widget: "string" }
              - { label: "Premier paragraphe", name: "paragraphe1", widget: "text" }
              - { label: "Second paragraphe", name: "paragraphe2", widget: "text" }
              - label: "Chiffres clés"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Chiffre (ex: 8, 100%, 4h)", name: "chiffre", widget: "string" }
                  - { label: "Légende", name: "label", widget: "string" }

          - label: "La carte (menu)"
            name: "menu"
            widget: "object"
            fields:
              - { label: "Petite ligne au-dessus du titre", name: "eyebrow", widget: "string" }
              - { label: "Titre de la section", name: "titre", widget: "string" }
              - label: "Catégories de plats"
                name: "categories"
                widget: "list"
                fields:
                  - { label: "Nom de la catégorie (ex: Pour commencer)", name: "nom", widget: "string" }
                  - label: "Plats"
                    name: "plats"
                    widget: "list"
                    fields:
                      - { label: "Nom du plat", name: "nom", widget: "string" }
                      - { label: "Description", name: "description", widget: "string" }
                      - { label: "Prix (ex: 18 €)", name: "prix", widget: "string" }
              - { label: "Note en bas de carte (ex: menu du jour)", name: "note", widget: "string" }

          - label: "L'ambiance (photos)"
            name: "ambiance"
            widget: "object"
            fields:
              - { label: "Petite ligne au-dessus du titre", name: "eyebrow", widget: "string" }
              - { label: "Titre de la section", name: "titre", widget: "string" }
              - label: "Légendes des photos"
                name: "cartes"
                widget: "list"
                fields:
                  - { label: "Légende", name: "legende", widget: "string" }

          - label: "Infos pratiques"
            name: "infos"
            widget: "object"
            fields:
              - { label: "Petite ligne au-dessus du titre", name: "eyebrow", widget: "string" }
              - { label: "Titre de la section", name: "titre", widget: "string" }
              - { label: "Adresse", name: "adresse", widget: "string" }
              - { label: "Téléphone (affiché, ex: 05 49 00 00 00)", name: "telephone", widget: "string" }
              - { label: "Téléphone (lien, ex: +33549000000)", name: "telephone_lien", widget: "string" }
              - label: "Horaires"
                name: "horaires"
                widget: "list"
                fields:
                  - { label: "Jours (ex: Mardi — Vendredi)", name: "jours", widget: "string" }
                  - { label: "Créneau (ex: 12h–14h / 19h–22h)", name: "creneau", widget: "string" }

          - label: "Pied de page"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Texte du pied de page", name: "texte", widget: "string" }
